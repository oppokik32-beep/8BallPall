<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock - Multi-Timezone Display</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="clock-wrapper">
            <!-- Header -->
            <header class="header">
                <h1><i class="fas fa-globe"></i> World Clock</h1>
                <p class="subtitle">Time Around the World</p>
            </header>

            <!-- Controls -->
            <div class="controls">
                <div class="control-group">
                    <label for="timezoneSelect">Add Timezone:</label>
                    <select id="timezoneSelect" class="timezone-select">
                        <option value="">Select a timezone...</option>
                    </select>
                    <button id="addBtn" class="add-btn">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
                <button id="resetBtn" class="reset-btn">
                    <i class="fas fa-redo"></i> Reset
                </button>
            </div>

            <!-- Clocks Container -->
            <div class="clocks-container" id="clocksContainer">
                <!-- Clocks will be inserted here -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <i class="fas fa-clock"></i>
                <p>No timezones selected. Add one to get started!</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
